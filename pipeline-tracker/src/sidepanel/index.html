<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline Tracker</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 12px;
        font-size: 13px;
        line-height: 1.4;
      }
      h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #666;
        margin: 0 0 6px 0;
        font-weight: 600;
      }
      .section {
        margin-bottom: 16px;
      }
      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .section-header h2 {
        margin: 0;
      }
      .count {
        font-size: 11px;
        color: #888;
      }
      .empty {
        color: #888;
        font-size: 12px;
        font-style: italic;
        padding: 8px 4px;
      }
      .truncation-note {
        font-size: 11px;
        color: #888;
        padding: 6px 4px;
        border-top: 1px dashed #ddd;
        margin-top: 4px;
      }
      .row {
        padding: 8px 4px;
        border-bottom: 1px solid #f0f0f0;
      }
      .row:last-of-type {
        border-bottom: none;
      }
      .row-head {
        display: flex;
        align-items: baseline;
        gap: 6px;
        cursor: pointer;
        list-style: none;
      }
      .row-head::-webkit-details-marker {
        display: none;
      }
      .name {
        font-weight: 600;
        flex: 1;
      }
      .time {
        color: #888;
        font-size: 11px;
        white-space: nowrap;
      }
      .badge {
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .badge-pending {
        background: #ede9fe;
        color: #6b21a8;
      }
      .badge-selectors {
        background: #f3f4f6;
        color: #4b5563;
      }
      .badge-ai {
        background: #dbeafe;
        color: #1e40af;
      }
      .badge-error {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge-partial {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-ok {
        background: #dcfce7;
        color: #166534;
      }
      .meta {
        margin-top: 4px;
        margin-left: 0;
        font-size: 12px;
        color: #555;
      }
      .meta div {
        margin-top: 2px;
      }
      .meta a {
        color: #2563eb;
        text-decoration: none;
        word-break: break-all;
      }
      .meta a:hover {
        text-decoration: underline;
      }
      .sync-status {
        margin-top: 4px;
        font-size: 11px;
        color: #6b21a8;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <section id="unsynced-section" class="section">
      <div class="section-header">
        <h2>Unsynced events</h2>
        <span id="unsynced-count" class="count"></span>
      </div>
      <div id="unsynced-list"></div>
    </section>

    <section id="activity-section" class="section">
      <div class="section-header">
        <h2>Recent activity</h2>
      </div>
      <div id="activity-list"></div>
    </section>

    <script src="sidepanel.js"></script>
  </body>
</html>
