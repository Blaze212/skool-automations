<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline Tracker</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        margin: 0;
        padding: 12px;
        font-size: 13px;
        line-height: 1.4;
      }
      h2 {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #666;
        margin: 0 0 6px 0;
        font-weight: 600;
      }
      .section {
        margin-bottom: 16px;
      }
      .section-header {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        margin-bottom: 6px;
      }
      .section-header h2 {
        margin: 0;
      }
      .count {
        font-size: 11px;
        color: #888;
      }
      .empty {
        color: #888;
        font-size: 12px;
        font-style: italic;
        padding: 8px 4px;
      }
      .truncation-note {
        font-size: 11px;
        color: #888;
        padding: 6px 4px;
        border-top: 1px dashed #ddd;
        margin-top: 4px;
      }
      .row {
        padding: 8px 4px;
        border-bottom: 1px solid #f0f0f0;
      }
      .row:last-of-type {
        border-bottom: none;
      }
      .row-head {
        display: flex;
        align-items: baseline;
        gap: 6px;
        cursor: pointer;
        list-style: none;
      }
      .row-head::-webkit-details-marker {
        display: none;
      }
      .name {
        font-weight: 600;
        flex: 1;
      }
      .time {
        color: #888;
        font-size: 11px;
        white-space: nowrap;
      }
      .badge {
        font-size: 10px;
        padding: 1px 5px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }
      .badge-pending {
        background: #ede9fe;
        color: #6b21a8;
      }
      .badge-selectors {
        background: #f3f4f6;
        color: #4b5563;
      }
      .badge-ai {
        background: #dbeafe;
        color: #1e40af;
      }
      .badge-error {
        background: #fee2e2;
        color: #991b1b;
      }
      .badge-partial {
        background: #fef3c7;
        color: #92400e;
      }
      .badge-ok {
        background: #dcfce7;
        color: #166534;
      }
      .meta {
        margin-top: 4px;
        margin-left: 0;
        font-size: 12px;
        color: #555;
      }
      .meta div {
        margin-top: 2px;
      }
      .meta a {
        color: #2563eb;
        text-decoration: none;
        word-break: break-all;
      }
      .meta a:hover {
        text-decoration: underline;
      }
      .sync-status {
        margin-top: 4px;
        font-size: 11px;
        color: #6b21a8;
        font-style: italic;
      }

      /* ── Settings section (Phase 6) ───────────────────────────────────── */
      .settings-details {
        margin-bottom: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        background: rgba(243, 244, 246, 0.4);
      }
      .settings-summary {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #666;
        padding: 8px 10px;
        cursor: pointer;
        font-weight: 600;
      }
      .settings-summary::-webkit-details-marker {
        color: #888;
      }
      .settings-body {
        padding: 4px 10px 10px;
      }
      .settings-row {
        display: flex;
        gap: 10px;
        padding: 8px 0;
        border-top: 1px solid #f0f0f0;
        align-items: flex-start;
        cursor: pointer;
      }
      .settings-row:first-of-type {
        border-top: none;
      }
      .settings-row-disabled {
        cursor: default;
        opacity: 0.55;
      }
      .settings-row input[type='checkbox'] {
        margin-top: 2px;
        flex: 0 0 auto;
      }
      .settings-row-text {
        flex: 1;
      }
      .settings-row-label {
        font-weight: 600;
        font-size: 12px;
      }
      .settings-row-help {
        font-size: 11px;
        color: #666;
        margin-top: 2px;
        line-height: 1.4;
      }
      .settings-row-error {
        font-size: 11px;
        color: #991b1b;
        background: #fee2e2;
        border-radius: 3px;
        padding: 4px 6px;
        margin: 4px 0;
      }
      .settings-subheading {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #888;
        margin: 10px 0 2px;
        font-weight: 600;
      }

      /* ── First-run modal (Phase 6 / D8 / D-rev-17) ─────────────────────── */
      .first-run-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.55);
        display: flex;
        align-items: flex-start;
        justify-content: center;
        z-index: 1000;
        padding: 24px 12px;
        overflow-y: auto;
      }
      .first-run-dialog {
        background: #ffffff;
        color: #0f172a;
        border-radius: 6px;
        max-width: 420px;
        width: 100%;
        padding: 18px 18px 14px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
      }
      .first-run-title {
        font-size: 15px;
        margin: 0 0 6px;
      }
      .first-run-intro {
        font-size: 12px;
        color: #475569;
        margin: 0 0 10px;
        line-height: 1.4;
      }
      .first-run-points {
        margin: 0 0 12px;
        padding-left: 18px;
        font-size: 12px;
        line-height: 1.45;
      }
      .first-run-points li {
        margin-bottom: 6px;
      }
      .first-run-toggle {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        padding: 10px;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        background: rgba(243, 244, 246, 0.5);
        cursor: pointer;
        margin-bottom: 12px;
      }
      .first-run-toggle input[type='checkbox'] {
        margin-top: 2px;
        flex: 0 0 auto;
      }
      .first-run-toggle-text {
        flex: 1;
      }
      .first-run-toggle-label {
        font-weight: 600;
        font-size: 12px;
      }
      .first-run-toggle-help {
        font-size: 11px;
        color: #475569;
        margin-top: 2px;
        line-height: 1.4;
      }
      .first-run-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }
      .first-run-hint {
        font-size: 11px;
        color: #94a3b8;
      }
      .first-run-close {
        appearance: none;
        background: #2563eb;
        color: #ffffff;
        border: 0;
        border-radius: 4px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .first-run-close:disabled {
        background: #cbd5e1;
        cursor: not-allowed;
      }
      .first-run-skip {
        appearance: none;
        background: transparent;
        color: #475569;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        padding: 6px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .first-run-skip:hover {
        background: #f1f5f9;
      }
      .first-run-error {
        margin-top: 10px;
        font-size: 11px;
        color: #991b1b;
        background: #fee2e2;
        border-radius: 3px;
        padding: 6px 8px;
      }

      /* ── Binding section (Phase 7) ────────────────────────────────────── */
      .binding-section {
        margin-bottom: 16px;
        border: 1px solid #e5e7eb;
        border-radius: 4px;
        padding: 10px;
        background: #f9fafb;
      }
      .binding-section .section-header {
        margin-bottom: 6px;
      }
      .binding-explain {
        font-size: 12px;
        color: #475569;
        line-height: 1.4;
        margin-bottom: 8px;
      }
      .binding-help {
        font-size: 11px;
        color: #64748b;
        line-height: 1.4;
        margin: 4px 0 8px;
      }
      .binding-status {
        font-weight: 600;
        font-size: 13px;
      }
      .binding-status-pending {
        color: #6b21a8;
      }
      .binding-status-confirmed {
        color: #166534;
      }
      .binding-countdown {
        font-size: 11px;
        color: #6b21a8;
        margin-top: 2px;
      }
      .binding-error {
        margin-top: 8px;
        font-size: 11px;
        color: #991b1b;
        background: #fee2e2;
        border-radius: 3px;
        padding: 6px 8px;
      }
      .binding-primary {
        appearance: none;
        background: #2563eb;
        color: #ffffff;
        border: 0;
        border-radius: 4px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      .binding-primary:disabled {
        background: #cbd5e1;
        cursor: not-allowed;
      }
      .binding-secondary {
        appearance: none;
        background: transparent;
        color: #475569;
        border: 1px solid #cbd5e1;
        border-radius: 4px;
        padding: 5px 10px;
        font-size: 12px;
        cursor: pointer;
      }
      .binding-secondary:hover {
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <div id="settings-section"></div>
    <div id="binding-section"></div>

    <section id="unsynced-section" class="section">
      <div class="section-header">
        <h2>Unsynced events</h2>
        <span id="unsynced-count" class="count"></span>
      </div>
      <div id="unsynced-list"></div>
    </section>

    <section id="activity-section" class="section">
      <div class="section-header">
        <h2>Recent activity</h2>
      </div>
      <div id="activity-list"></div>
    </section>

    <div id="modal-root"></div>

    <script src="sidepanel.js"></script>
  </body>
</html>
