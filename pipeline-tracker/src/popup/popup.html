<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pipeline Tracker</title>
    <style>
      body {
        font-family: sans-serif;
        min-width: 320px;
        padding: 12px;
      }
      .configured {
        color: green;
        font-size: 12px;
        margin-bottom: 8px;
      }
      .not-configured {
        color: #888;
        font-size: 12px;
        margin-bottom: 8px;
      }
      input[type='text'] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
        margin-bottom: 4px;
      }
      .error-msg {
        color: red;
        font-size: 11px;
        margin-bottom: 4px;
      }
      button {
        padding: 6px 12px;
        cursor: pointer;
        margin-right: 6px;
      }
      .confirm {
        color: green;
        font-size: 12px;
      }
      .timestamp {
        font-size: 11px;
        color: #555;
        margin-top: 8px;
      }
      .last-error {
        font-size: 11px;
        color: red;
        margin-top: 4px;
      }
      label {
        font-size: 12px;
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
      }
      #history {
        margin-top: 12px;
        border-top: 1px solid #e5e5e5;
        padding-top: 8px;
      }
      .history-heading {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #666;
        margin-bottom: 6px;
      }
      .history-entry {
        font-size: 12px;
        padding: 6px 4px;
        border-bottom: 1px solid #f0f0f0;
      }
      .history-entry:last-of-type {
        border-bottom: none;
      }
      .history-head {
        display: flex;
        align-items: baseline;
        gap: 6px;
        cursor: pointer;
        list-style: none;
      }
      .history-head::-webkit-details-marker {
        display: none;
      }
      .history-icon {
        font-size: 13px;
      }
      .history-icon.ok {
        color: #16a34a;
      }
      .history-icon.partial {
        color: #d97706;
      }
      .history-icon.error {
        color: #dc2626;
      }
      .history-time {
        color: #888;
        font-size: 11px;
      }
      .history-title {
        font-weight: 600;
      }
      .history-message {
        margin-top: 2px;
        margin-left: 22px;
        color: #555;
        font-style: italic;
      }
      .history-detail {
        margin: 4px 0 0 22px;
        font-family: monospace;
        font-size: 10px;
        white-space: pre-wrap;
        background: #f8f8f8;
        padding: 4px 6px;
        border-radius: 3px;
        color: #333;
      }
      .clear-history {
        margin-top: 8px;
        font-size: 11px;
        background: none;
        border: 1px solid #ccc;
        color: #555;
        padding: 3px 8px;
      }
    </style>
  </head>
  <body>
    <!-- Setup mode: shown when no api_key is stored -->
    <div id="setup-mode">
      <p style="font-size: 13px; margin-bottom: 10px">Enter your Pipeline Tracker API key.</p>
      <input type="text" id="api-key-input" placeholder="Enter API key" />
      <div id="api-key-error" class="error-msg" style="display: none">API key cannot be empty</div>
      <div>
        <button id="save-btn">Save</button>
        <span id="save-confirm" class="confirm" style="display: none">Saved ✓</span>
      </div>
    </div>

    <!-- Configured mode: shown when api_key is stored -->
    <div id="configured-mode" style="display: none">
      <div id="status" class="configured">Configured</div>
      <div id="timestamp" class="timestamp" style="display: none"></div>
      <div id="last-error" class="last-error" style="display: none"></div>

      <section id="history" style="display: none">
        <div class="history-heading">Recent activity</div>
        <div id="history-list"></div>
        <button id="clear-history-btn" class="clear-history">Clear history</button>
      </section>

      <div style="margin-top: 8px">
        <button id="test-btn">Test connection</button>
        <button id="reset-btn">Reset</button>
      </div>
      <div id="test-result" style="display: none; margin-top: 6px; font-size: 12px"></div>
      <label>
        <input type="checkbox" id="debug-toggle" />
        Debug mode (sends selector diagnostics on failure)
      </label>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
